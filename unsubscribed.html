<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Lauren S. | Unsubscribed</title>
	<link rel="icon" href="assets/img/favicon.svg">
	<style>
		:root{--bg:#eef9f2;--text:#1c1d20;--muted:#555;--accent:#448c74}
		html,body{height:100%}
		body{margin:0;font-family:"Courier New",Courier,monospace;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #f5fbf7 0%, #eef7f1 100%);color:var(--text);padding:24px;text-align:center}
		.main-content{max-width:720px;width:100%;}
		h1{font-size:34px;margin:0 0 16px;color:var(--accent)}
		p{margin:0 0 18px;color:var(--muted);line-height:1.7}
		hr{border:none;border-top:1px solid rgba(68,140,116,.24);margin:26px auto;width:60px}
		.email{margin:28px 0 0;font-size:1rem;color:var(--text)}
		.email a{color:var(--accent);text-decoration:none;font-weight:700}
		.small{color:var(--muted);font-size:15px}
		strong{color:var(--text)}
		a{color:inherit}
	</style>
</head>
<body>
	<main class="main-content" role="main">
		<h1>You've been unsubscribed</h1>
		<p>You'll no longer receive emails from Lauren S.</p>

		<hr>

		<p>Your request has been processed successfully. You won't receive newsletters or marketing emails unless you subscribe again in the future.</p>

		<hr>

		<p class="small">Need help?</p>
		<p class="email"><a href="mailto:legal@lauren-salvo.dev">legal@lauren-salvo.dev</a></p>
	</main>
